{% extends 'base.html' %}
{% block content %}
<h1 class="h4">Opciones de preguntas cerradas</h1>
<div class="row g-3">
{% for question in managed_questions %}
  <div class="col-md-6">
    <div class="card">
      <div class="card-body">
        <h2 class="h6">{{ question.label }}</h2>
        <form method="post">
          {% csrf_token %}
          <input type="hidden" name="question_id" value="{{ question.id }}" />
          <div class="mb-2">
            <label class="form-label">Opciones (separadas por coma)</label>
            <input name="bulk_options" class="form-control" placeholder="Opción 1, Opción 2" />
          </div>
          <button class="btn btn-outline-primary btn-sm">Guardar opciones</button>
        </form>
      </div>
    </div>
  </div>
{% empty %}
  <div class="col-12"><div class="alert alert-warning">No hay preguntas de selección.</div></div>
{% endfor %}
</div>
{% endblock %}
