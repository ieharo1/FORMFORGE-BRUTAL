<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}FormForge Brutal{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand fw-bold" href="/">FormForge Brutal</a>
        <div class="ms-auto d-flex gap-2">
          {% if user.is_authenticated %}
            <a class="btn btn-outline-light btn-sm" href="{% url 'dashboard' %}">Dashboard</a>
            <form method="post" action="{% url 'logout' %}">{% csrf_token %}<button class="btn btn-warning btn-sm">Salir</button></form>
          {% else %}
            <a class="btn btn-outline-light btn-sm" href="{% url 'login' %}">Entrar</a>
          {% endif %}
        </div>
      </div>
    </nav>

    <main class="container py-4">
      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-{{ message.tags|default:'info' }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
      {% block content %}{% endblock %}
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
